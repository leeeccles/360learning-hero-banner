<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>360Learning Hero Banner</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');

    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      height: 56px;
      overflow: hidden;
      background: transparent;
    }

    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 3px;
    }

    .line1 {
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: #111827;
      line-height: 1.3;
      margin: 0;
      letter-spacing: -0.01em;
      white-space: nowrap;
    }

    .companion {
      background: linear-gradient(100deg, #6d28d9 0%, #a21caf 55%, #ec4899 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
      white-space: nowrap;
    }

    .line2 {
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      line-height: 1.3;
      margin: 0;
      letter-spacing: -0.01em;
      white-space: nowrap;
      height: 1.3em;
      display: flex;
      align-items: center;
    }

    .typed {
      background: linear-gradient(100deg, #6d28d9 0%, #a21caf 55%, #ec4899 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
    }

    .cursor {
      display: inline-block;
      width: 3px;
      height: 0.8em;
      background: #ec4899;
      margin-left: 3px;
      vertical-align: middle;
      border-radius: 2px;
      animation: blink 1s step-end infinite;
      flex-shrink: 0;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    @media (prefers-reduced-motion: reduce) {
      .cursor { animation: none; }
    }
  </style>
</head>
<body>

  <p class="line1">Ask <span class="companion">✦ Companion</span> anything about how work gets done here.</p>

  <p class="line2">
    <span id="typed" class="typed" aria-live="polite" aria-atomic="true"></span><span id="cursor" class="cursor" aria-hidden="true"></span>
  </p>

  <script>
  (function () {
    /* ─── EDIT ME ─────────────────────────────────────────── */
    var QUESTIONS = [
      "What's our AI policy?",
      "How do I handle a pricing objection?",
      "How do I create a pivot table?",
      "How do we close a deal?"
    ];
    /* ──────────────────────────────────────────────────────── */

    var PAUSE_MS   = 2500;
    var TYPE_MS    = 55;
    var DELETE_MS  = 28;
    var BETWEEN_MS = 350;

    var typedEl  = document.getElementById('typed');
    var cursorEl = document.getElementById('cursor');

    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
      typedEl.textContent = QUESTIONS[0];
      cursorEl.style.display = 'none';
      return;
    }

    var qIndex = 0, charIndex = 0, deleting = false;

    function tick() {
      var q = QUESTIONS[qIndex];
      if (!deleting) {
        typedEl.textContent = q.slice(0, ++charIndex);
        if (charIndex === q.length) { deleting = true; setTimeout(tick, PAUSE_MS); return; }
        setTimeout(tick, TYPE_MS);
      } else {
        typedEl.textContent = q.slice(0, --charIndex);
        if (charIndex === 0) { deleting = false; qIndex = (qIndex + 1) % QUESTIONS.length; setTimeout(tick, BETWEEN_MS); return; }
        setTimeout(tick, DELETE_MS);
      }
    }

    setTimeout(tick, 600);
  }());
  </script>

</body>
</html>
